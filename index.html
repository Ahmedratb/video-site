<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> هفكر في اسم لما يخلص</title>

<style>
  body {
    background-image: url("img.jpg");
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; /* توسيط أفقي */
    align-items: center;     /* توسيط رأسي */
    
body{
  font-family: Arial;
  background:#f2f2f2;
  text-align:center;
}

    
header{
  background:#111;
  color:#fff;
  padding:15px;
  font-size:22px;
}

    
button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:10px;
  background:green;
  color:white;
}

input[type="file"]{
  display:none;
}

    
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  padding:15px;
}

    
.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

    
video{
  width:100%;
  border-radius:10px;
}
</style>

  
</head>

  
<body>

  
<header> هفكر في اسم لما يخلص </header>

  
<input type="file" id="fileInput" accept="video/*">

  
<button onclick="document.getElementById('fileInput').click()">
➕ إضافة فيديو
</button>

  
<div class="container" id="videos"></div>

  
<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  
<script>

  
// ================== بياناتك ==================
const SUPABASE_URL = "https://qysqikpdbbeddkvhzeii.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5c3Fpa3BkYmJlZGRrdmh6ZWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODIzMDAsImV4cCI6MjA5NzU1ODMwMH0._CSPAx3kFd8hhKkU8IheNKAU06cqatfCaxAH9l64MzI";


// إنشاء الاتصال
const db = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

console.log("STEP 1 OK");


const fileInput = document.getElementById("fileInput");
const videosDiv = document.getElementById("videos");


// ================= رفع الفيديو =================
fileInput.addEventListener("change", async function () {

  let file = this.files[0];
  if (!file) return;


  let fileName = Date.now() + "_" + file.name;


  // رفع الفيديو
  const { error: uploadError } = await db.storage
    .from("videos")
    .upload(fileName, file);


  if (uploadError) {
    console.log(uploadError);
    alert("فشل رفع الفيديو");
    return;
  }


  // رابط الفيديو
  const { data } = db.storage
    .from("videos")
    .getPublicUrl(fileName);


  let videoUrl = data.publicUrl;


  // حفظ البيانات
  const { error: dbError } = await db
    .from("videos")
    .insert([
      {
        title: file.name,
        url: videoUrl
      }
    ]);


  if (dbError) {
    console.log(dbError);
    alert("فشل حفظ البيانات");
    return;
  }


  alert("تم رفع الفيديو بنجاح");

  loadVideos();

});



// ================= عرض الفيديوهات =================
async function loadVideos(){
  

  videosDiv.innerHTML = "";


  const { data, error } = await db
    .from("videos")
    .select("*")
    .order("id", { ascending:false });


  if(error){
    console.log(error);
    return;
  }


  if(!data || data.length === 0){

    videosDiv.innerHTML = "<p>لا توجد فيديوهات</p>";
    return;

  }


  data.forEach(v => {

    let card = document.createElement("div");

    card.className = "card";


    card.innerHTML = `
      <video controls playsinline>
        <source src="${v.url}" type="video/mp4">
      </video>

      <p>${v.title}</p>
    `;


    videosDiv.appendChild(card);

  });

}


loadVideos();
  
  
</script>

  
</body>
  
</html>
