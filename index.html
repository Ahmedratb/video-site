<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع الفيديوهات</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  text-align:center;
}

header{
  background:#111;
  color:#fff;
  padding:15px;
  font-size:22px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:10px;
  background:green;
  color:white;
}

input[type="file"]{
  display:none;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

video{
  width:100%;
  border-radius:10px;
}
</style>

</head>

<body>

<header>🎬 موقع الفيديوهات</header>

<input type="file" id="fileInput" accept="video/*">

<button onclick="document.getElementById('fileInput').click()">
➕ إضافة فيديو
</button>

<div class="container" id="videos"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ================== بياناتك ==================
const SUPABASE_URL = "https://qysqikpdbbeddkvhzeii.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5c3Fpa3BkYmJlZGRrdmh6ZWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODIzMDAsImV4cCI6MjA5NzU1ODMwMH0._CSPAx3kFd8hhKkU8IheNKAU06cqatfCaxAH9l64MzI";
// ============================================

// إنشاء الاتصال الصح
const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const fileInput = document.getElementById("fileInput");
const videosDiv = document.getElementById("videos");


// ================= رفع الفيديو =================
fileInput.addEventListener("change", async function () {

  let file = this.files[0];
  if (!file) return;

  let fileName = Date.now() + "_" + file.name;

  // رفع في Storage
  const { error: uploadError } = await supabase.storage
    .from("videos")
    .upload(fileName, file);

  if (uploadError) {
    console.log(uploadError);
    alert("فشل رفع الفيديو");
    return;
  }

  // جلب الرابط
  const { data: urlData } = supabase.storage
    .from("videos")
    .getPublicUrl(fileName);

  let videoUrl = urlData.publicUrl;

  // حفظ في الجدول
  const { error: dbError } = await supabase
    .from("videos")
    .insert([
      { title: file.name, url: videoUrl }
    ]);

  if (dbError) {
    console.log(dbError);
    alert("فشل حفظ البيانات");
    return;
  }

  loadVideos();

});


// ================= عرض الفيديوهات =================
async function loadVideos() {

  videosDiv.innerHTML = "";

  const { data, error } = await supabase
    .from("videos")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  if (!data || data.length === 0) {
    videosDiv.innerHTML = "<p>لا توجد فيديوهات</p>";
    return;
  }

  data.forEach(v => {

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <video controls playsinline>
        <source src="${v.url}" type="video/mp4">
      </video>
      <p>${v.title}</p>
    `;

    videosDiv.appendChild(card);

  });

}

loadVideos();

</script>

</body>
</html>
