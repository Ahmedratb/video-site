<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>موقع الفيديوهات</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f2f2f2;
  text-align:center;
}

header{
  background:#222;
  color:white;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.add{
  margin:20px;
}

#videoInput{
  display:none;
}

.add button{
  background:#008000;
  color:white;
  border:0;
  padding:12px 25px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:15px;
  box-shadow:0 3px 10px #ccc;
}

video{
  width:100%;
  max-height:300px;
  border-radius:10px;
}

.delete{
  margin-top:10px;
  background:red;
  color:white;
  border:0;
  padding:8px 20px;
  border-radius:8px;
  cursor:pointer;
}

</style>

</head>

<body>

<header>
🎬 موقع الفيديوهات
</header>


<div class="add">

<input type="file" id="videoInput" accept="video/*">

<button onclick="document.getElementById('videoInput').click()">
➕ إضافة فيديو
</button>

</div>


<div class="container" id="videos"></div>



<script>

const input = document.getElementById("videoInput");
const videos = document.getElementById("videos");


input.addEventListener("change", function(){

let file = this.files[0];

if(!file){
return;
}


let url = URL.createObjectURL(file);


let card = document.createElement("div");
card.className = "card";


let video = document.createElement("video");
video.controls = true;
video.playsInline = true;
video.src = url;


let btn = document.createElement("button");
btn.className = "delete";
btn.innerText = "🗑️ حذف الفيديو";


btn.onclick = function(){

video.pause();
URL.revokeObjectURL(url);
card.remove();

};


card.appendChild(video);
card.appendChild(btn);


videos.appendChild(card);


});


</script>


</body>
</html>
